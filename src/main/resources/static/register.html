<!DOCTYPE html>
<html>
<head>
  <title>Auth Test</title>
</head>
<body>

<h2>Register</h2>
<form id="registerForm">
  <input type="text" id="regUsername" placeholder="Username" required><br>
  <input type="text" id="regDisplayName" placeholder="Display Name" required><br>
  <input type="email" id="regEmail" placeholder="Email"><br>
  <input type="text" id="regPhone" placeholder="Phone Number"><br>
  <input type="password" id="regPassword" placeholder="Password" required><br>
  <button type="submit">Register</button>
</form>

<p id="registerResult"></p>


<p>Don't have an account? <a href="/login.html">Register</a></p>



<script>
  document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
      username: document.getElementById("regUsername").value,
      displayName: document.getElementById("regDisplayName").value,
      email: document.getElementById("regEmail").value || null,
      phoneNumber: document.getElementById("regPhone").value || null,
      password: document.getElementById("regPassword").value
    };

    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    document.getElementById("registerResult").innerText = text;
  });


</script>

</body>
</html>
