<!DOCTYPE html>
<html>
<head>
  <title>Auth Test</title>
</head>
<body>

<h2>Login</h2>
<form id="login-form">
  <input type="text" id="login-identifier" placeholder="Username / Email / Phone" required><br>
  <input type="password" id="login-password" placeholder="Password" required><br>
  <button type="submit" id="login-btn">Login</button>
</form>

<p id="login-result"></p>

<div id="google-sign-in-button"></div>

<p>Don't have an account? <a href="/register.html">Register</a></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="js/GoogleSignInManager.js"></script>

<script>
  document.getElementById("login-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loginBtn = document.getElementById("login-btn");
    const loginResult = document.getElementById("login-result");
    const identifier = document.getElementById("login-identifier").value;
    const password = document.getElementById("login-password").value;

    // Men-set State loading
    loginBtn.disabled = true;
    loginBtn.classList.add("loading");
    loginBtn.innerText = "Loading...";
    loginResult.className = "";
    loginResult.innerText = "";

    try {
      const data = {
        identifier: identifier,
        password: password
      };

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const message = await res.text();

      if (res.ok) {
        loginResult.className = "success";
        loginResult.innerText = "Login berhasil! Redirecting...";
        setTimeout(() => {
          window.location.replace("/");
        }, 1500);
      } else {
        loginResult.className = "error";
        loginResult.style.color = "red"; // Biar keliatan merah errornya
        loginResult.innerText = message;
      }
    } catch (error) {
      loginResult.className = "error";
      loginResult.innerText = "Terjadi kesalahan sistem.";
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerText = "Login";
    }
  });
</script>

<script>
  new GoogleSignInManager()
          .ElementID('google-sign-in-button')
          .ClientID('246704411302-hr4q3cb0u300318uvfp7q1b4lbjuvues.apps.googleusercontent.com')
          .CheckTokenURL('/api/auth/google')
          .SuccessURL('/')
          .FailURL('/login.html')
          .AutoPrompt(false);
</script>

</body>
</html>
