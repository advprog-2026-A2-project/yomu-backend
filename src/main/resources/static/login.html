<!DOCTYPE html>
<html>
<head>
  <title>Auth Test</title>
</head>
<body>


<h2>Login</h2>
<form id="loginForm">
  <input type="text" id="loginIdentifier" placeholder="Username / Email / Phone" required><br>
  <input type="password" id="loginPassword" placeholder="Password" required><br>
  <button type="submit" id="loginBtn">Login</button>
</form>

<p id="loginResult"></p>

<div id="googleSignInButton"></div>

<p>Don't have an account? <a href="/register.html">Register</a></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="js/GoogleSignInManager.js"></script>

<script>

  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loginBtn = document.getElementById("loginBtn");
    const loginResult = document.getElementById("loginResult");
    const identifier = document.getElementById("loginIdentifier").value;
    const password = document.getElementById("loginPassword").value;

    // Men-set State loading
    loginBtn.disabled = true;
    loginBtn.classList.add("loading");
    loginBtn.innerText = "Loading...";
    loginResult.className = "";
    loginResult.innerText = "";

    try {
      const data = {
        identifier: identifier,
        password: password
      };

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const text = await res.text();

      // Menangani status respons
      if (res.ok) {
        console.log('Login success:', res.status);
        loginResult.className = "success";
        loginResult.innerText = "Login berhasil! Redirecting...";
        // Redirect ke index.html secara eksplisit
        setTimeout(() => {
          window.location.replace("/");
        }, 1500);
      } else {
        console.error('Login failed:', res.status, text);
        loginResult.className = "error";
        loginResult.innerText = "Login gagal: " + text;
      }
    } catch (error) {
      loginResult.className = "error";
      loginResult.innerText = "Error: " + error.message;
    } finally {
      // State tombol reset
      loginBtn.disabled = false;
      loginBtn.classList.remove("loading");
      loginBtn.innerText = "Login";
    }
  });
</script>

<script>
  new GoogleSignInManager()
    .ElementID('googleSignInButton')
    .ClientID('246704411302-hr4q3cb0u300318uvfp7q1b4lbjuvues.apps.googleusercontent.com')
    .CheckTokenURL('/api/auth/google')
    .SuccessURL('/')
    .FailURL('/login.html')
    .AutoPrompt(false);
</script>

</body>
</html>
